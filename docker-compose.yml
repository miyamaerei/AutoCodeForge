version: '3.8'

services:
  # 前端服务
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: autocodeforge-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=http://backend:80
    networks:
      - app-network
    restart: unless-stopped

  # 后端服务
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: autocodeforge-backend
    ports:
      - "5000:80"
    depends_on:
      - database
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=database;Database=AutoCodeForge;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=AutoCodeForge
      - Jwt__Audience=AutoCodeForge
      - Jwt__ExpirationMinutes=60
      - Encryption__Key=${ENCRYPTION_KEY}
    volumes:
      - backend-data:/app/data
    networks:
      - app-network
    restart: unless-stopped

  # 数据库服务
  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: autocodeforge-database
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${DB_PASSWORD}
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "${DB_PASSWORD}" -Q "SELECT 1" || exit 1
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s

networks:
  app-network:
    driver: bridge

volumes:
  backend-data:
    driver: local
  sqlserver-data:
    driver: local
