name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  NODE_VERSION: '20.x'
  DOTNET_VERSION: '10.0.x'

jobs:
  # 前端 CI
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      
      - name: Install dependencies
        working-directory: ./client
        run: npm ci
      
      - name: Run ESLint
        working-directory: ./client
        run: npm run lint
      
      - name: Run type check
        working-directory: ./client
        run: npm run type-check
      
      - name: Run tests
        working-directory: ./client
        run: npm run test
      
      - name: Build frontend
        working-directory: ./client
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: client/dist
          retention-days: 7

  # 后端 CI
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Restore dependencies
        working-directory: ./server
        run: dotnet restore
      
      - name: Build backend
        working-directory: ./server
        run: dotnet build --configuration Release --no-restore
      
      - name: Run tests
        working-directory: ./server
        run: dotnet test --configuration Release --no-build --verbosity normal
      
      - name: Publish backend
        working-directory: ./server
        run: dotnet publish src/AutoCodeForge.Api/AutoCodeForge.Api.csproj --configuration Release --output ./publish --no-build
      
      - name: Upload publish artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: server/publish
          retention-days: 7

  # Docker 构建
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/autocodeforge-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/autocodeforge-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/autocodeforge-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/autocodeforge-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 部署到生产环境（可选）
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/autocodeforge
            docker-compose pull
            docker-compose up -d
            docker-compose ps
