name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  NODE_VERSION: '20.x'
  DOTNET_VERSION: '10.0.x'

jobs:
  # 前端 CI
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      
      - name: Install dependencies
        working-directory: ./client
        run: npm ci
      
      - name: Run type check
        working-directory: ./client
        run: npm run type-check
      
      - name: Run tests
        working-directory: ./client
        run: npm run test:unit
      
      - name: Build frontend
        working-directory: ./client
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: client/dist
          retention-days: 7

  # 后端 CI
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Restore dependencies
        working-directory: ./server
        run: dotnet restore src/AutoCodeForge.Api/AutoCodeForge.Api.csproj
      
      - name: Build backend
        working-directory: ./server
        run: dotnet build src/AutoCodeForge.Api/AutoCodeForge.Api.csproj --configuration Release --no-restore
      
      - name: Run tests
        working-directory: ./server
        run: dotnet test tests/AutoCodeForge.Tests/AutoCodeForge.Tests.csproj --configuration Release --no-build --verbosity normal
      
      - name: Publish backend
        working-directory: ./server
        run: dotnet publish src/AutoCodeForge.Api/AutoCodeForge.Api.csproj --configuration Release --output ./publish --no-build
      
      - name: Upload publish artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: server/publish
          retention-days: 7
